<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UltraEvolve | Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f7f3;
      --card: #ffffff;
      --ink: #0f172a;
      --muted: #5f6b7b;
      --accent: #1f7a6c;
      --stroke: #e5e7eb;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      --font-display: "Space Grotesk", "Inter", sans-serif;
      --font-body: "Inter", "Space Grotesk", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink);
    }
    header {
      border-bottom: 1px solid var(--stroke);
      background: #f9faf7;
    }
    .container {
      width: min(980px, 92vw);
      margin: 0 auto;
      padding: 24px 0 60px;
    }
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-family: var(--font-display);
      font-weight: 700;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 14px;
      margin-top: 24px;
    }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(26px, 4vw, 36px);
      margin: 0;
    }
    label { font-size: 14px; color: var(--muted); }
    input {
      width: 100%;
      border: 1px solid var(--stroke);
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      font-family: var(--font-body);
    }
    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      background: var(--accent);
      color: #fff;
      font-family: var(--font-display);
      font-size: 15px;
      cursor: pointer;
    }
    .note { font-size: 13px; color: var(--muted); }
    .status { font-size: 13px; color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <div class="logo">UltraEvolve</div>
      <a href="/">Back to Home</a>
    </div>
  </header>

  <main class="container">
    <h1>Sign Up with Invite Code</h1>
    <div class="card">
      <label>Invite Code</label>
      <input id="reg-code" type="text" placeholder="6-digit invite code" />
      <label>Email</label>
      <input id="reg-email" type="email" placeholder="you@example.com" />
      <label>Password</label>
      <input id="reg-pass" type="password" placeholder="At least 6 characters" />
      <button class="btn" id="reg-submit" type="button">Create Account</button>
      <div class="status" id="reg-status"></div>
      <div class="note">Have an invite code? Sign up now to start using UltraEvolve.</div>
    </div>
  </main>

  <script>
    const codeInput = document.getElementById("reg-code");
    const emailInput = document.getElementById("reg-email");
    const passInput = document.getElementById("reg-pass");
    const statusEl = document.getElementById("reg-status");
    const submitBtn = document.getElementById("reg-submit");

    submitBtn.addEventListener("click", async () => {
      const payload = {
        code: codeInput.value.trim(),
        email: emailInput.value.trim(),
        password: passInput.value.trim(),
      };
      if (!payload.code || !payload.email || !payload.password) {
        statusEl.textContent = "Please fill in invite code, email, and password.";
        return;
      }
      submitBtn.disabled = true;
      statusEl.textContent = "Creating account...";
      try {
        const resp = await fetch("/v1/invites/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await resp.json();
        if (!resp.ok) {
          const detail = data.detail || "Registration failed";
          if (detail.includes("email_exists")) {
            statusEl.textContent = "Email already registered. Please sign in.";
          } else {
            statusEl.textContent = detail;
          }
        } else {
          statusEl.textContent = "Success! Redirecting to sign in...";
          setTimeout(() => {
            window.location.href = "/static/login.html";
          }, 800);
        }
      } catch (err) {
        statusEl.textContent = "Network error. Please try again later.";
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
